<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>
    {% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}
  </title>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% seo %}
</head>
<body>
  <div class="site-wrapper">
    <aside class="sidebar">
      <div class="sidebar-inner">
          <img src="{{ '/assets/headshot.jpg' | relative_url }}" alt="{{ site.title }}" class="headshot-sm">
        <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
        <p class="tagline">{{ site.description }}</p>
        <nav>
          <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>HOME</a>
          <a href="{{ '/cv' | relative_url }}"{% if page.url contains 'cv' %} class="active"{% endif %}>CV</a>
          <a href="{{ '/research' | relative_url }}"{% if page.url contains 'research' %} class="active"{% endif %}>RESEARCH</a>
          <a href="{{ '/blog' | relative_url }}"{% if page.url contains 'blog' or page.layout == 'post' %} class="active"{% endif %}>THOUGHTS</a>
          <a href="{{ '/contact' | relative_url }}"{% if page.url contains 'contact' %} class="active"{% endif %}>CONTACT</a>
        </nav>
      </div>
    </aside>

    <main class="main-content">
      {{ content }}
    </main>
  </div>

  <footer class="site-footer">
    <p>PEDRO H. P. ROCHA &middot; {{ site.email }}</p>
  </footer>
</body>
</html>
