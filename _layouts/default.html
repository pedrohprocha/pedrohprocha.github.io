<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>
    {% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}
  </title>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% seo %}
</head>
<body>
  <div class="site-wrapper">
    <header class="site-header">
      <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
      <p class="tagline">{{ site.description }}</p>
      <nav>
        <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>About</a>
        <a href="{{ '/cv' | relative_url }}"{% if page.url contains 'cv' %} class="active"{% endif %}>CV</a>
        <a href="{{ '/teaching' | relative_url }}"{% if page.url contains 'teaching' %} class="active"{% endif %}>Teaching</a>
        <a href="{{ '/blog' | relative_url }}"{% if page.url contains 'blog' or page.layout == 'post' %} class="active"{% endif %}>Blog</a>
        <a href="{{ '/contact' | relative_url }}"{% if page.url contains 'contact' %} class="active"{% endif %}>Contact</a>
      </nav>
    </header>

    <main>
      {{ content }}
    </main>

    <footer class="site-footer">
      <p>Pedro H. P. Rocha &middot; {{ site.email }}</p>
    </footer>
  </div>
</body>
</html>
